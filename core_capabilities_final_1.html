<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Capabilities</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(979.857px 423.003px at 66.18% 55.29%,
          #167487 0%,
          #167487 15.3253%,
          #0B414F 43.9553%,
          #062F39 68.1881%,
          #02222A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      padding: 64px 16px;
      font-family: 'PP Mori', 'PPMori', sans-serif;
    }

    /* LAYOUT */
    .page {
      width: 100%;
      margin: 0 auto;
    }

    .layout {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 40px;
      width: 100%;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 520px);
      gap: 48px;
      align-items: start;
      margin-bottom: 64px;
    }

    .intro-title,
    .intro-copy {
      font-family: 'PP Mori', 'PPMori', 'Segoe UI', sans-serif;
      font-style: normal;
      font-weight: 400;
      color: #f3f5f6;
    }

    .intro-title {
      font-size: 42px;
      line-height: 120%;
      letter-spacing: -0.02em;
      max-width: 700px;
    }

    .intro-copy {
      font-size: 18px;
      line-height: 150%;
      color: rgba(243, 245, 246, 0.88);
      max-width: 520px;
    }

    .intro-copy p + p {
      margin-top: 20px;
    }

    /* SVG SCENE */
    .svg-scene {
      width: min(58vw, 766px);
      max-width: 766px;
      aspect-ratio: 766 / 424;
      position: relative;
      flex: 0 0 auto;
    }

    .svg-scene svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* LOGO breathing */
    #logo-group {
      animation: logoGlow 3.5s ease-in-out infinite;
      transform-origin: 383px 154px;
    }

    @keyframes logoGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 4px rgba(76, 234, 245, 0.3));
      }

      50% {
        filter: drop-shadow(0 0 18px rgba(76, 234, 245, 0.7));
      }
    }

    /* Particle beams - subtle pulse */
    .beam-group {
      animation: beamPulse 2s ease-in-out infinite;
    }

    .beam-group:nth-child(2) {
      animation-delay: 0.3s;
    }

    .beam-group:nth-child(3) {
      animation-delay: 0.6s;
    }

    .beam-group:nth-child(4) {
      animation-delay: 0.9s;
    }

    .beam-group:nth-child(5) {
      animation-delay: 0.15s;
    }

    .beam-group:nth-child(6) {
      animation-delay: 0.45s;
    }

    .beam-group:nth-child(7) {
      animation-delay: 0.75s;
    }

    .beam-group:nth-child(8) {
      animation-delay: 1.05s;
    }

    @keyframes beamPulse {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    /* ── Tile hover and active ── */
    .tile-btn {
      cursor: pointer;
    }

    /* ── tile-surface (inactive base for tiles 1-5) ── */
    .tile-surface {
      transition: opacity 0.52s cubic-bezier(0.4, 0, 0.2, 1),
                  filter  0.52s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      filter: blur(0px) brightness(1);
    }

    .tile-btn:hover .tile-surface {
      filter: blur(0px) brightness(1.18);
    }

    .tile-btn.active .tile-surface {
      opacity: 0;
      filter: blur(3px) brightness(0.72);
    }

    /* icon-flat (flat icon for tiles 1-5 inactive) */
    .icon-flat {
      transition: opacity 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
    }

    .tile-btn.active .icon-flat {
      opacity: 0;
    }

    /* ── inactive-state (tile0 inactive) ── */
    .inactive-state {
      transition: opacity 0.52s cubic-bezier(0.4, 0, 0.2, 1),
                  filter  0.52s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      filter: blur(0px) brightness(1);
      pointer-events: none;
    }

    .tile-btn.active .inactive-state {
      opacity: 0;
      filter: blur(3px) brightness(0.72);
    }

    /* ── active-state (all tiles) ── */
    /*
     * opacity → JS inline style (0 ↔ 1), animated via CSS transition below.
     * filter  → CSS only — creates the smooth "materialize" arrival effect.
     *
     * Resting (hidden) state : slight glow-blur → feels "waiting just behind" the scene.
     * Active (visible) state : crisp, full brightness → "stepped forward".
     *
     * Easing: cubic-bezier(0.2, 0, 0, 1) = Material M3 "emphasised decelerate"
     *   – starts at pace, then glides to a silky halt.  Feels premium / luxurious.
     * Delay 0.06s: let the inactive finish dimming first, then the active arrives.
     */
    .active-state {
      transition: opacity 0.72s 0.06s cubic-bezier(0.2, 0, 0, 1),
                  filter  0.72s 0.06s cubic-bezier(0.2, 0, 0, 1);
      opacity: 0;
      pointer-events: none;
      filter: blur(6px) brightness(1.9) saturate(1.25);
    }

    /* Allow direct clicking on embedded tile state SVGs */
    .tile-btn > .inactive-state,
    .tile-btn > .active-state {
      pointer-events: all;
    }

    .tile-btn.active .active-state {
      /* opacity = 1 set by JS; filter glides to sharp via transition above */
      filter: blur(0px) brightness(1) saturate(1);
    }

    /* glow strips breathe when active */
    .glow-strips {
      opacity: 0;
      transition: opacity 0.35s;
    }

    .tile-btn.active .glow-strips {
      opacity: 1;
    }

    /* ── Orbital panels floating animation ── */
    /*
     * Runs continuously on all active-state orbital panels.
     * Each path gets a different duration + negative delay so they start
     * at different phases immediately — creates organic, randomised float.
     *
     * cubic-bezier(0.45, 0, 0.55, 1) ≈ perfect sine-wave easing:
     * starts slow, accelerates to mid, decelerates gently back — no snap.
     */
    @keyframes orbitalFloat {
      0%, 100% { transform: translateY(0px);     }
      50%      { transform: translateY(-5.75px); }
    }

    .active-state > g[opacity="0.5"] > path {
      transform-box:    fill-box;
      transform-origin: center;
    }

    /* panel 1 — back-top  (4.8 × 0.85 = 4.08s) */
    .active-state > g[opacity="0.5"] > path:nth-child(1) {
      animation: orbitalFloat 4.1s cubic-bezier(0.45, 0, 0.55, 1) -0.0s  infinite;
    }
    /* panel 2 — right  (5.4 × 0.85 = 4.59s) */
    .active-state > g[opacity="0.5"] > path:nth-child(2) {
      animation: orbitalFloat 4.6s cubic-bezier(0.45, 0, 0.55, 1) -1.3s  infinite;
    }
    /* panel 3 — front-left  (4.2 × 0.85 = 3.57s) */
    .active-state > g[opacity="0.5"] > path:nth-child(3) {
      animation: orbitalFloat 3.6s cubic-bezier(0.45, 0, 0.55, 1) -2.6s  infinite;
    }
    /* panel 4 — small front  (5.0 × 0.85 = 4.25s) */
    .active-state > g[opacity="0.5"] > path:nth-child(4) {
      animation: orbitalFloat 4.25s cubic-bezier(0.45, 0, 0.55, 1) -0.9s  infinite;
    }
    /* panel 5 — left  (4.6 × 0.85 = 3.91s) */
    .active-state > g[opacity="0.5"] > path:nth-child(5) {
      animation: orbitalFloat 3.9s cubic-bezier(0.45, 0, 0.55, 1) -3.4s  infinite;
    }
    /* panel 6 — right-back  (5.2 × 0.85 = 4.42s) */
    .active-state > g[opacity="0.5"] > path:nth-child(6) {
      animation: orbitalFloat 4.4s cubic-bezier(0.45, 0, 0.55, 1) -2.0s  infinite;
    }

    /* 3D Icon Animation — Software Engineering floating icon card */
    .icon-animate {
      transform-box:    fill-box;
      transform-origin: center;
      transform-style:  preserve-3d;
      animation: iconSpin3D 7s linear infinite;
      filter: drop-shadow(0 0 20px rgba(76, 234, 245, 0.4));
      --icon-x: 55px;
      --icon-y: 77px;
      --icon-scale: 1.35;
    }

    @keyframes iconSpin3D {
      0%   { transform: translate(var(--icon-x), var(--icon-y)) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 30deg) scale(calc(var(--icon-scale) * 0.7)) rotate3d(0, 0.1, 0, 0deg); }
      100% { transform: translate(var(--icon-x), var(--icon-y)) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 30deg) scale(calc(var(--icon-scale) * 0.7)) rotate3d(0, 0.1, 0, 360deg); }
    }

    /* CAP LIST WRAPPER */
    .cap-list-wrapper {
      width: min(44vw, 500px);
      min-width: 300px;
      height: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .cap-list-header {
      margin-bottom: 20px;
      padding-left: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cap-list-header::before {
      content: '';
      display: block;
      width: 18px;
      height: 2px;
      background: linear-gradient(90deg, #4CEAF5, rgba(76, 234, 245, 0.2));
      border-radius: 2px;
      flex-shrink: 0;
    }

    .cap-list-label {
      font-size: clamp(9px, 0.75vw, 11px);
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(76, 234, 245, 0.55);
    }

    /* CAP LIST */
    .cap-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 0;
    }

    .cap-item {
      padding: 16px 22px 16px 18px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid rgba(76, 234, 245, 0.18);
      background: linear-gradient(92deg, rgba(13, 49, 58, 0.5), rgba(9, 35, 42, 0.15));
      transition: all 0.28s;
      position: relative;
      overflow: hidden;
    }

    .cap-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #4CEAF5 0%, rgba(76, 234, 245, 0.3) 100%);
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.28s;
    }

    .cap-item:hover {
      border-color: rgba(76, 234, 245, 0.32);
      background: linear-gradient(92deg, rgba(18, 63, 74, 0.58), rgba(9, 38, 46, 0.22));
    }

    .cap-item:hover::before {
      opacity: 0.4;
    }

    .cap-item.active {
      border-color: rgba(76, 234, 245, 0.48);
      background: linear-gradient(94deg, rgba(21, 70, 82, 0.72), rgba(11, 45, 54, 0.28));
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28), 0 0 18px rgba(76, 234, 245, 0.07), inset 0 1px 0 rgba(76, 234, 245, 0.1);
    }

    .cap-item.active::before {
      opacity: 1;
      width: 4px;
    }

    .cap-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Serial number */
    .cap-number {
      font-size: clamp(9px, 0.75vw, 11px);
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(76, 234, 245, 0.25);
      min-width: 20px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      transition: color 0.28s;
      font-family: 'PP Mori', 'PPMori', sans-serif;
    }

    .cap-item.active .cap-number,
    .cap-item:hover .cap-number {
      color: rgba(76, 234, 245, 0.6);
    }

    .cap-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a6e74;
      flex-shrink: 0;
      transition: background 0.28s, box-shadow 0.28s, transform 0.28s;
    }

    .cap-item.active .cap-dot {
      background: #4CEAF5;
      box-shadow: 0 0 0 3px rgba(76, 234, 245, 0.18), 0 0 10px rgba(76, 234, 245, 0.6);
      animation: dotPulse 2s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(76, 234, 245, 0.18), 0 0 8px rgba(76, 234, 245, 0.5); }
      50%       { box-shadow: 0 0 0 5px rgba(76, 234, 245, 0.08), 0 0 14px rgba(76, 234, 245, 0.8); }
    }

    .cap-title {
      font-size: clamp(13px, 1.15vw, 18px);
      font-weight: 500;
      color: #7ea1a6;
      transition: color 0.28s;
      letter-spacing: 0.2px;
      flex: 1;
    }

    .cap-item.active .cap-title,
    .cap-item:hover .cap-title {
      color: #f0fcff;
    }

    /* Arrow indicator */
    .cap-arrow {
      font-size: 13px;
      color: rgba(76, 234, 245, 0);
      transition: color 0.28s, transform 0.28s;
      transform: translateX(-8px);
      flex-shrink: 0;
      line-height: 1;
    }

    .cap-item.active .cap-arrow,
    .cap-item:hover .cap-arrow {
      color: rgba(76, 234, 245, 0.65);
      transform: translateX(0);
    }

    .cap-desc {
      font-size: clamp(11px, 0.9vw, 14px);
      font-weight: 300;
      color: #d4e8eb;
      line-height: 1.5;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.28s ease, opacity 0.28s ease, margin-top 0.28s ease;
      padding-left: 36px;
      margin-top: 0;
      max-width: 38ch;
    }

    .cap-item.active .cap-desc {
      max-height: 80px;
      opacity: 1;
      color: #b8d8de;
      margin-top: 10px;
    }

    @media (max-width: 1100px) {
      .layout {
        gap: 24px;
      }

      .cap-list-wrapper {
        min-width: 270px;
      }
    }

    @media (max-width: 920px) {
      .intro {
        grid-template-columns: 1fr;
        gap: 18px;
        margin-bottom: 24px;
      }

      .intro-title {
        font-size: 30px;
      }

      .intro-copy {
        font-size: 16px;
      }

      .layout {
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .cap-list-wrapper {
        width: 100%;
        min-width: 0;
        max-width: 766px;
        height: auto;
        order: 2;
      }

      .cap-list {
        width: 100%;
        min-width: 0;
      }

      .svg-scene {
        width: 100%;
        order: 1;
      }

      .cap-item {
        padding: 12px 14px 12px 14px;
      }

      .cap-title {
        font-size: 14px;
      }

      .cap-desc {
        font-size: 11px;
        max-width: 100%;
      }
    }

    @media (max-width: 640px) {
      .intro {
        margin-bottom: 18px;
      }

      .intro-title {
        font-size: 26px;
      }

      .intro-copy {
        font-size: 15px;
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 100px 40px;
      }
    }

    @media (min-width: 992px) {
      body {
        padding: 120px 20px;
      }
    }

    @media (min-width: 1280px) {
      body {
        padding: 120px 100px;
      }

      .page {
        max-width: 1440px;
      }
    }
  </style>
</head>

    // Inactive state: small ellipse, same as in original SVG for each tile
    // Using the existing ellipse already in each tile-surface (white fill-opacity 0.2)
    // We just need the active-state group for JS toggling - inactive uses the existing surface ellipse
    // So we only inject active-state groups
    const svg = document.getElementById('mainSvg');
    tileData.forEach(t => {
      const tile = document.getElementById(t.id);
      if (!tile) return;
      if (tile.querySelector(':scope > .active-state') && tile.querySelector(':scope > .inactive-state')) return;
      const temp = document.createElementNS(NS, 'g');
      temp.innerHTML = activeStateSVG(t.id, t.cx, t.tileTopY);
      const activeG = temp.firstElementChild;
      activeG.style.opacity = '0';
      // No inline transition — CSS handles opacity + filter transition for smooth materialize effect
      tile.appendChild(activeG);
    });

    // Left->right visual order (by SVG X coords):

      { id: 'tile0', label: 'Software Engineering', desc: 'Application development, microservices, API design, DevOps, CI/CD automation' },

      { id: 'tile2', label: 'Risk & Compliance', desc: 'Governance, audit frameworks, security controls, regulatory compliance' }
    ];

    let activeId = 'tile0';

    function setActive(tileId) {
      if (tileId === activeId) return;

      // deactivate previous
      const prevTile = document.getElementById(activeId);
      if (prevTile) {
        prevTile.classList.remove('active');
        const prevAg = prevTile.querySelector('.active-state');
        if (prevAg) prevAg.style.opacity = '0';
      }
      const prevListEl = document.querySelector(`.cap-item[data-tile="${activeId}"]`);
      if (prevListEl) prevListEl.classList.remove('active');

      // activate chosen
      const chosenTile = document.getElementById(tileId);
      if (chosenTile) {
        chosenTile.classList.add('active');
        const ag = chosenTile.querySelector('.active-state');
        if (ag) ag.style.opacity = '1';
      }
      const listEl = document.querySelector(`.cap-item[data-tile="${tileId}"]`);
      if (listEl) listEl.classList.add('active');
      activeId = tileId;
    }

    // Build list
    const list = document.getElementById('capList');
    caps.forEach((cap, idx) => {
      const item = document.createElement('div');
      item.className = 'cap-item';
      item.dataset.tile = cap.id;

      item.addEventListener('click', () => setActive(cap.id));
      list.appendChild(item);
    });

    // Wire tile clicks
    tileData.forEach(t => {
      const tile = document.getElementById(t.id);
      if (tile) tile.addEventListener('click', () => setActive(t.id));
    });

    // Initial state
    activeId = '';

  <script>
    (function () {
      function getDocHeight() {
        return Math.max(
          document.documentElement.scrollHeight,
          document.body.scrollHeight,
          document.documentElement.offsetHeight,
          document.body.offsetHeight
        );
      }

      function sendHeight() {
        window.parent.postMessage(
          {
            type: 'core-capabilities-resize',
            height: getDocHeight()
          },
          '*'
        );
      }

      window.addEventListener('load', sendHeight);
      window.addEventListener('resize', sendHeight);

      if (window.ResizeObserver) {
        const ro = new ResizeObserver(sendHeight);
        ro.observe(document.documentElement);
        ro.observe(document.body);
      }

      if (window.MutationObserver) {
        const mo = new MutationObserver(sendHeight);
        mo.observe(document.body, { childList: true, subtree: true, attributes: true });
      }

      setTimeout(sendHeight, 0);
      setTimeout(sendHeight, 200);
      setTimeout(sendHeight, 800);

      // Respond to parent pinging for height (solves race condition)
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'request-core-capabilities-height') {
          sendHeight();
        }
      });
    })();
